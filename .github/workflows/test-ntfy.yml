name: Test NTFY Push

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Send test push
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          curl -sS -X POST \
            -H "Title: Ticketwatch Test" \
            -H "Content-Type: text/plain; charset=utf-8" \
            --data "Wenn du das siehst, klappt die Benachrichtigung ✅" \
            "https://ntfy.sh/$NTFY_TOPIC"
