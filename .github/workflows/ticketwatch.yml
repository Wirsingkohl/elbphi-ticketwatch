name: Elbphi Ticket Watch

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"  # alle 10 Minuten (UTC)

jobs:
  watch:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # damit wir ticket_state.json zurück ins Repo committen können

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run watcher
        env:
          EVENT_URLS: |
            https://www.elbphilharmonie.de/de/programm/strauss-elektra-alan-gilbert/23295
          NTFY_URL: https://ntfy.sh
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python watch.py

      - name: Commit state if changed
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "ticket-watcher"
            git config user.email "ticket-watcher@users.noreply.github.com"
            git add ticket_state.json
            git commit -m "Update ticket state"
            git push
          else
            echo "No changes."
          fi
